name: Build & Push Docker Image

on:
  push:
    branches: [master]
  workflow_dispatch: # consente avvio manuale dalla UI GitHub

permissions:
  contents: read
  id-token: write # richiesto da WIF

jobs:
  build-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Autenticazione GCP via Workload Identity Federation
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      # Login a Google Artifact Registry usando il token WIF
      - name: Docker login — Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.GAR_HOSTNAME }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.auth_token }}

      # Buildx per il supporto al cache multi-stage
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build e push — cache GHA accelera npm ci e go mod download
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ vars.GAR_IMAGE }}:latest
            ${{ vars.GAR_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
