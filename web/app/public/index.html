<!DOCTYPE html>
<html lang="en" class="{{ .Theme }}">
  <head>
    <meta charset="utf-8" />
    <script type="text/javascript">
      window.config = {logo: "{{ .UI.Logo }}", header: "{{ .UI.Header }}", dashboardHeading: "{{ .UI.DashboardHeading }}", dashboardSubheading: "{{ .UI.DashboardSubheading }}", link: "{{ .UI.Link }}", buttons: [], maximumNumberOfResults: "{{ .UI.MaximumNumberOfResults }}", defaultSortBy: "{{ .UI.DefaultSortBy }}", defaultFilterBy: "{{ .UI.DefaultFilterBy }}", loginSubtitle: "{{ .UI.LoginSubtitle }}"};{{- range .UI.Buttons}}window.config.buttons.push({name:"{{ .Name }}",link:"{{ .Link }}"});{{end}}
      // Initialize theme immediately to prevent flash
      (function() {
        const themeFromCookie = document.cookie.match(/theme=(dark|light);?/)?.[1];
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (themeFromCookie === 'dark' || (!themeFromCookie && prefersDark)) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
      // Dev-mode fallback: when Go template vars are not rendered (vue-cli serve), inject local config
      (function() {
        if (window.config && window.config.header && window.config.header.startsWith('{' + '{')) {
          window.config.logo = '';
          window.config.header = 'MaiaSolution';
          window.config.dashboardHeading = 'Health Dashboard';
          window.config.dashboardSubheading = 'Monitora lo stato dei servizi in tempo reale';
        }
      })();
    </script>
    <title>{{ .UI.Title }}</title>
    <script>if(document.title.startsWith('{' + '{'))document.title='MaiaSolution | Status';</script>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <link rel="icon" href="https://framerusercontent.com/images/WCGkkGnsJYsT2nCqQjUBQYAhZc.png" media="(prefers-color-scheme: light)" />
    <link rel="icon" href="https://framerusercontent.com/images/0ipEyNQ7YMdjoF9QbIcntakCXs.png" media="(prefers-color-scheme: dark)" />
    <link rel="apple-touch-icon" href="https://framerusercontent.com/images/WCGkkGnsJYsT2nCqQjUBQYAhZc.png" />
    <link rel="manifest" href="/manifest.json" crossorigin="use-credentials" />
    <link rel="stylesheet" href="/css/custom.css" />
    <meta name="description" content="{{ .UI.Description }}" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="{{ .UI.Title }}" />
    <meta name="application-name" content="{{ .UI.Title }}" />
    <meta name="theme-color" content="#f7f9fb" />
  </head>
  <body>
    <noscript><strong>Enable JavaScript to view this page.</strong></noscript>
    <div id="app"></div>
  </body>
</html>
